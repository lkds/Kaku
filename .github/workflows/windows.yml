name: Windows Build and Release

on:
  push:
    branches: [ main, master, windows-support ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Build Release
      run: cargo build --release
    
    - name: Smoke test - Verify executables
      shell: bash
      run: |
        echo "=== Testing kaku.exe ==="
        ./target/release/kaku.exe --version || echo "kaku.exe --version failed"
        ./target/release/kaku.exe --help || echo "kaku.exe --help failed"
        
        echo "=== Testing kaku-gui.exe ==="
        ./target/release/kaku-gui.exe --version || echo "kaku-gui.exe --version failed"
        ./target/release/kaku-gui.exe --help || echo "kaku-gui.exe --help failed"
        
        echo "=== Verifying file sizes ==="
        ls -la target/release/kaku.exe target/release/kaku-gui.exe
    
    - name: Run tests
      run: cargo test --release --no-fail-fast
      continue-on-error: true
    
    - name: Create portable package
      shell: bash
      run: |
        mkdir -p release
        cp target/release/kaku.exe release/
        cp target/release/kaku-gui.exe release/
        cp -r assets release/ 2>/dev/null || true
        cp README.md release/ 2>/dev/null || true
        cp LICENSE.md release/ 2>/dev/null || true
    
    - name: Create ZIP archive
      shell: bash
      run: |
        cd release
        7z a -tzip ../Kaku-${{ github.ref_name }}-windows-x64-portable.zip *
    
    - name: Upload portable artifact
      uses: actions/upload-artifact@v4
      with:
        name: kaku-portable-windows
        path: Kaku-*-windows-x64-portable.zip
        retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download Portable
      uses: actions/download-artifact@v4
      with:
        name: kaku-portable-windows
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: Kaku-*-windows-x64-portable.zip
        body: |
          ## Kaku ${{ github.ref_name }} - Windows Release
          
          ### Download
          
          | File | Description |
          |------|-------------|
          | `Kaku-*-portable.zip` | Portable version, extract and run |
          
          ### Usage
          
          1. Download and extract the ZIP file
          2. Run `kaku-gui.exe` to start the terminal
          3. Run `kaku.exe` for CLI commands
          
          ### Features
          
          - ✅ Fast terminal with DX12 rendering
          - ✅ High DPI support
          - ✅ AI coding integration
          
          ### System Requirements
          
          - Windows 10 1809+ / Windows 11
          - 64-bit (x64)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}