name: Windows Build and Release

on:
  push:
    branches: [ main, master, windows-support ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Build Release
      run: cargo build --release
    
    - name: Run tests
      run: cargo test --release --no-fail-fast
      continue-on-error: true
    
    - name: Create portable package
      shell: bash
      run: |
        mkdir -p release
        cp target/release/kaku.exe release/
        cp target/release/kaku-gui.exe release/
        cp -r assets release/ 2>/dev/null || true
        cp README.md release/ 2>/dev/null || true
        cp LICENSE.md release/ 2>/dev/null || true
    
    - name: Create ZIP archive
      shell: bash
      run: |
        cd release
        7z a -tzip ../Kaku-${{ github.ref_name }}-windows-x64-portable.zip *
    
    - name: Upload portable artifact
      uses: actions/upload-artifact@v4
      with:
        name: kaku-portable-windows
        path: Kaku-*-windows-x64-portable.zip
        retention-days: 30

  build-msi:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: build-windows
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download portable artifact
      uses: actions/download-artifact@v4
      with:
        name: kaku-portable-windows
    
    - name: Extract portable files
      shell: bash
      run: |
        mkdir -p target/release
        7z x Kaku-*-portable.zip -otarget/release -y
        ls target/release
    
    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix --version 4.0.4
        wix extension add WixToolset.UI.wixext
    
    - name: Build MSI
      shell: bash
      run: |
        wix build wix/kaku.wxs -ext WixToolset.UI.wixext -o Kaku-0.8.0-windows-x64.msi
    
    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: kaku-msi-windows
        path: Kaku-*-windows-x64.msi
        retention-days: 30

  build-nsis:
    name: Build NSIS Installer
    runs-on: windows-latest
    needs: build-windows
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download portable artifact
      uses: actions/download-artifact@v4
      with:
        name: kaku-portable-windows
    
    - name: Extract portable files
      shell: bash
      run: |
        mkdir -p target/release
        7z x Kaku-*-portable.zip -otarget/release -y
    
    - name: Install NSIS
      run: choco install nsis -y
    
    - name: Build NSIS Installer
      shell: bash
      run: |
        makensis kaku.nsi
    
    - name: Upload NSIS artifact
      uses: actions/upload-artifact@v4
      with:
        name: kaku-nsis-windows
        path: Kaku-*-windows-x64-setup.exe
        retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-msi, build-nsis]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download MSI
      uses: actions/download-artifact@v4
      with:
        name: kaku-msi-windows
    
    - name: Download NSIS
      uses: actions/download-artifact@v4
      with:
        name: kaku-nsis-windows
    
    - name: Download Portable
      uses: actions/download-artifact@v4
      with:
        name: kaku-portable-windows
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Kaku-*-windows-x64.msi
          Kaku-*-windows-x64-setup.exe
          Kaku-*-windows-x64-portable.zip
        body: |
          ## Kaku ${{ github.ref_name }} - Windows Release
          
          ### Download Options
          
          | File | Description |
          |------|-------------|
          | `Kaku-*-portable.zip` | Portable version, no installation needed |
          | `Kaku-*-setup.exe` | NSIS installer with shell integration |
          | `Kaku-*.msi` | MSI installer for enterprise deployment |
          
          ### Features
          
          - ✅ Fast terminal with DX12 rendering
          - ✅ High DPI support
          - ✅ AI coding integration
          - ✅ Right-click "Open Kaku here"
          
          ### System Requirements
          
          - Windows 10 1809+ / Windows 11
          - 64-bit (x64)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}